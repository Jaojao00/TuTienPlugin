# Đây là file bắt buộc phải có để server Minecraft nhận diện mã của bạn là một Plugin.
name: TuTienPlugin
version: 2.0
main: tutien.core.TuTienPlugin
api-version: '1.20'
author: Tài Dev Nguyễn
description: Plugin hệ thống Tu Tiên Sprint 1→4 — Đầy đủ tính năng.

# Softdepend: load được khi có, không bạt buộc
softdepend: [PlaceholderAPI, Vault, WorldGuard]

commands:
  tutien:
    description: Hệ thống lệnh Tu Tiên toàn tập
    usage: "§cSử dụng: /tutien để xem danh sách lệnh."
    aliases: [tt, tuvi]
  tiende:
    description: Thi triển Cấm Thuật Tiên Đế
    usage: "§cSử dụng: /tiende để xem danh sách cấm thuật."