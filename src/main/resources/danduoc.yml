#  KHU VỰC LUYỆN ĐAN (WorldGuard Region)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Yêu cầu: WorldGuard phải được cài trên server.
# Cách tạo khu vực:
#   1. Dùng WorldEdit chọn 2 điểm: //pos1 và //pos2
#   2. Tạo region: /rg define dan-lo
#   3. Đặt tên region vào "TenRegion" bên dưới
# BatBuoc: true  = Phải đứng trong khu vực mới luyện được
# BatBuoc: false = Luyện đan ở bất kỳ đâu (mặc định)
KhuVucLuyenDan:
  BatBuoc: true
  TenRegion: "dan-lo"
  ThongBao: "§c§l[Đan Lò] §fNgươi phải đến §eĐan Phòng §f(khu vực luyện đan) mới có thể khai lò!"
